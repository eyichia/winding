<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梯形面積計算器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .calculator-card { max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card calculator-card">
        <div class="card-header bg-primary text-white text-center">
            <h3>梯形面積計算器</h3>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">上底</label>
                    <input type="number" name="upper" class="form-control" step="any" value="{{ data.upper }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">下底</label>
                    <input type="number" name="lower" class="form-control" step="any" value="{{ data.lower }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">高</label>
                    <input type="number" name="height" class="form-control" step="any" value="{{ data.height }}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">開始計算</button>
            </form>

            {% if result is not none %}
            <div class="alert alert-success mt-4 text-center">
                <h5>計算結果</h5>
                <p class="display-6"><strong>{{ result }}</strong></p>
            </div>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
